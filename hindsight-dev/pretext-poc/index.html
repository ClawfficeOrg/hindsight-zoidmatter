<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hindsight Memory Visualizer — Pretext POC</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #d2a8ff;
    --accent4: #f78166;
    --accent5: #79c0ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }

  .header h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .header .sep { color: var(--border); }

  .tabs {
    display: flex;
    gap: 2px;
    background: var(--bg);
    border-radius: 6px;
    padding: 2px;
  }

  .tab {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    background: transparent;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { background: var(--border); color: var(--text); }

  .stats {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .canvas-wrap {
    position: relative;
    width: 100%;
    height: calc(100vh - 49px);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: default;
  }

  .tooltip {
    display: none;
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text);
    max-width: 360px;
    pointer-events: none;
    z-index: 20;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    line-height: 1.5;
  }

  .tooltip .type {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .tooltip .entities {
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-muted);
  }

  .tooltip .entities span {
    background: rgba(88, 166, 255, 0.15);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: 4px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Hindsight</h1>
  <span class="sep">|</span>
  <div class="tabs">
    <button class="tab active" data-view="wall">Memory Wall</button>
    <button class="tab" data-view="constellation">Constellation</button>
    <button class="tab" data-view="timeline">Timeline</button>
  </div>
  <div class="stats" id="stats">Loading...</div>
</div>

<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div class="tooltip" id="tooltip"></div>
</div>

<script type="module">
import { prepare, layout, prepareWithSegments, layoutWithLines } from 'https://esm.sh/@chenglou/pretext@0.0.3';

// ============================================================
// Mock data — simulates Hindsight memories
// ============================================================

const FACT_TYPES = ['world', 'experience', 'observation'];
const TYPE_COLORS = {
  world: '#58a6ff',
  experience: '#3fb950',
  observation: '#d2a8ff',
};

const ENTITY_NAMES = [
  'Alice', 'Bob', 'Charlie', 'Diana', 'Eve', 'Frank', 'Grace', 'Hank',
  'Google', 'Microsoft', 'Anthropic', 'OpenAI', 'Meta', 'Apple',
  'PostgreSQL', 'Redis', 'TypeScript', 'Python', 'Rust', 'Go',
  'React', 'Vue', 'Svelte', 'Docker', 'Kubernetes',
  'San Francisco', 'New York', 'London', 'Tokyo', 'Berlin',
  'Machine Learning', 'NLP', 'Computer Vision', 'Embeddings', 'RAG',
];

const MEMORY_TEMPLATES = [
  "{person} works at {company} as a {role}",
  "{person} prefers {tech} over {tech2} for backend development",
  "{person} mentioned that {company} is investing heavily in {field}",
  "The team decided to migrate from {tech} to {tech2} for better performance",
  "{person} and {person2} collaborated on the {field} project last {month}",
  "{company} released a new {field} framework that {person} recommends",
  "Meeting notes: {person} presented the {tech} architecture for {field}",
  "{person} has 10 years of experience with {tech} and recently started learning {tech2}",
  "The {tech} deployment in {city} improved latency by 40%",
  "{company} acquired a {field} startup based in {city}",
  "{person} gave a talk at the {city} conference about {field} applications",
  "Bug report: {tech} integration with {tech2} fails under high load",
  "{person} suggested using {tech} for the new {field} pipeline",
  "The {company} team in {city} uses {tech} for their {field} models",
  "{person} wrote a blog post comparing {tech} and {tech2} for {field}",
  "Observation: {person} consistently advocates for {tech}-based solutions",
  "Pattern: {company} teams prefer {tech} for {field} workloads",
  "{person} reported that {tech} reduced memory usage by 60% in {field} tasks",
  "The {city} office uses a different {tech} configuration than {city2}",
  "{person} and {person2} disagree on whether {tech} is suitable for {field}",
];

const ROLES = ['engineer', 'researcher', 'PM', 'data scientist', 'architect', 'CTO'];
const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September'];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateMemory(id) {
  let text = pick(MEMORY_TEMPLATES);
  const entities = [];
  const persons = ENTITY_NAMES.filter(n => !['Google','Microsoft','Anthropic','OpenAI','Meta','Apple','PostgreSQL','Redis','TypeScript','Python','Rust','Go','React','Vue','Svelte','Docker','Kubernetes','San Francisco','New York','London','Tokyo','Berlin','Machine Learning','NLP','Computer Vision','Embeddings','RAG'].includes(n));
  const companies = ['Google','Microsoft','Anthropic','OpenAI','Meta','Apple'];
  const techs = ['PostgreSQL','Redis','TypeScript','Python','Rust','Go','React','Vue','Svelte','Docker','Kubernetes'];
  const cities = ['San Francisco','New York','London','Tokyo','Berlin'];
  const fields = ['Machine Learning','NLP','Computer Vision','Embeddings','RAG'];

  const replacements = {
    '{person}': () => { const p = pick(persons); entities.push(p); return p; },
    '{person2}': () => { const p = pick(persons); entities.push(p); return p; },
    '{company}': () => { const c = pick(companies); entities.push(c); return c; },
    '{tech}': () => { const t = pick(techs); entities.push(t); return t; },
    '{tech2}': () => { const t = pick(techs); entities.push(t); return t; },
    '{city}': () => { const c = pick(cities); entities.push(c); return c; },
    '{city2}': () => { const c = pick(cities); entities.push(c); return c; },
    '{field}': () => { const f = pick(fields); entities.push(f); return f; },
    '{role}': () => pick(ROLES),
    '{month}': () => pick(MONTHS),
  };

  for (const [key, fn] of Object.entries(replacements)) {
    while (text.includes(key)) text = text.replace(key, fn());
  }

  const type = pick(FACT_TYPES);
  const daysAgo = Math.floor(Math.random() * 365);
  const date = new Date(Date.now() - daysAgo * 86400000);

  return {
    id,
    text,
    type,
    entities: [...new Set(entities)],
    date,
    color: TYPE_COLORS[type],
    // 2D position for constellation (will be computed)
    cx: 0, cy: 0,
  };
}

const MEMORY_COUNT = 10_000;
const memories = Array.from({length: MEMORY_COUNT}, (_, i) => generateMemory(i));

// Assign 2D positions for constellation view (clustered by entity similarity)
// Simple: hash entities to position, add jitter — spread wider for 10k
function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0; return h; }

for (const m of memories) {
  const seed = m.entities.length > 0 ? hashStr(m.entities[0]) : m.id * 7919;
  const angle = (seed % 360) * (Math.PI / 180);
  const radius = 300 + (Math.abs(seed) % 1200);
  m.cx = Math.cos(angle) * radius + (Math.random() - 0.5) * 300;
  m.cy = Math.sin(angle) * radius + (Math.random() - 0.5) * 300;
}

// ============================================================
// Pretext preparation — batch prepare all memory texts
// ============================================================

const FONT = '13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
const FONT_SMALL = '11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
const FONT_BOLD = 'bold 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
const MONO = '11px "SF Mono", "Fira Code", Consolas, monospace';

console.time('pretext:prepare');
const prepared = memories.map(m => ({
  full: prepareWithSegments(m.text, FONT),
  small: prepareWithSegments(m.text, FONT_SMALL),
  height: prepare(m.text, FONT),
  heightSmall: prepare(m.text, FONT_SMALL),
}));
console.timeEnd('pretext:prepare');

// ============================================================
// Canvas setup
// ============================================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const statsEl = document.getElementById('stats');
let dpr = window.devicePixelRatio || 1;
let W, H;

function resize() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
}
resize();
window.addEventListener('resize', () => { resize(); });

// ============================================================
// State
// ============================================================

let currentView = 'wall';
let scrollY = 0;
let targetScrollY = 0;
let maxScroll = 0;
let hoverIndex = -1;

// Constellation state
let panX = 0, panY = 0, zoom = 1;
let targetPanX = 0, targetPanY = 0, targetZoom = 1;
let isDragging = false;
let dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;

// Timeline state
let timelineScrollX = 0;
let targetTimelineScrollX = 0;

// Perf
let lastFrameTime = 0;
let fps = 0;
let layoutCallCount = 0;

// ============================================================
// View 1: Memory Wall — virtualized canvas list
// ============================================================

const WALL_CARD_WIDTH_RATIO = 0.42;
const WALL_COLS = () => W > 1200 ? 3 : W > 700 ? 2 : 1;
const WALL_GAP = 12;
const WALL_PAD = 20;

// Pre-compute card heights for wall view
let wallCardHeights = [];
let wallCardPositions = [];

function computeWallLayout() {
  const cols = WALL_COLS();
  const totalGap = WALL_PAD * 2 + WALL_GAP * (cols - 1);
  const cardW = Math.floor((W - totalGap) / cols);
  const textW = cardW - 28; // padding

  wallCardHeights = [];
  wallCardPositions = [];

  // Masonry layout: track column heights
  const colHeights = new Array(cols).fill(WALL_PAD);

  console.time('pretext:wall-layout');
  layoutCallCount = 0;

  for (let i = 0; i < memories.length; i++) {
    const {height: textH} = layout(prepared[i].height, textW, 19);
    layoutCallCount++;

    const entityH = memories[i].entities.length > 0 ? 22 : 0;
    const cardH = 32 + textH + entityH + 14; // header + text + entities + padding
    wallCardHeights.push(cardH);

    // Find shortest column
    let minCol = 0;
    for (let c = 1; c < cols; c++) {
      if (colHeights[c] < colHeights[minCol]) minCol = c;
    }

    const x = WALL_PAD + minCol * (cardW + WALL_GAP);
    const y = colHeights[minCol];

    wallCardPositions.push({x, y, w: cardW, h: cardH});
    colHeights[minCol] += cardH + WALL_GAP;
  }

  console.timeEnd('pretext:wall-layout');
  maxScroll = Math.max(0, Math.max(...colHeights) - H + WALL_PAD);
}

function drawWall() {
  if (wallCardPositions.length === 0) computeWallLayout();

  ctx.save();
  ctx.scale(dpr, dpr);

  // Only draw visible cards (virtualization!)
  const viewTop = scrollY - 50;
  const viewBottom = scrollY + H + 50;
  let visibleCount = 0;

  for (let i = 0; i < memories.length; i++) {
    const pos = wallCardPositions[i];
    if (pos.y + pos.h < viewTop || pos.y > viewBottom) continue;
    visibleCount++;

    const m = memories[i];
    const isHovered = i === hoverIndex;
    const x = pos.x;
    const y = pos.y - scrollY;
    const w = pos.w;
    const h = pos.h;

    // Card background
    ctx.fillStyle = isHovered ? '#1c2333' : '#161b22';
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 8);
    ctx.fill();

    // Border
    ctx.strokeStyle = isHovered ? m.color : '#30363d';
    ctx.lineWidth = isHovered ? 1.5 : 0.5;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 8);
    ctx.stroke();

    // Glow on hover
    if (isHovered) {
      ctx.shadowColor = m.color;
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, 8);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Type badge
    ctx.font = FONT_BOLD;
    ctx.fillStyle = m.color;
    const badge = m.type.toUpperCase();
    const badgeW = ctx.measureText(badge).width + 10;
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.roundRect(x + 12, y + 10, badgeW, 18, 4);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = m.color;
    ctx.fillText(badge, x + 17, y + 23);

    // Date
    ctx.font = MONO;
    ctx.fillStyle = '#484f58';
    const dateStr = m.date.toLocaleDateString('en-US', {month: 'short', day: 'numeric'});
    ctx.textAlign = 'right';
    ctx.fillText(dateStr, x + w - 12, y + 23);
    ctx.textAlign = 'left';

    // Memory text — rendered via Pretext!
    const textX = x + 14;
    const textY = y + 38;
    const textW = w - 28;

    ctx.font = FONT;
    ctx.fillStyle = isHovered ? '#e6edf3' : '#c9d1d9';

    const {lines} = layoutWithLines(prepared[i].full, textW, 19);
    for (let j = 0; j < lines.length; j++) {
      ctx.fillText(lines[j].text, textX, textY + j * 19 + 14);
    }

    // Entity tags
    if (m.entities.length > 0) {
      const tagY = textY + lines.length * 19 + 6;
      let tagX = textX;
      ctx.font = '10px -apple-system, sans-serif';

      for (const entity of m.entities) {
        const tw = ctx.measureText(entity).width + 10;
        if (tagX + tw > x + w - 14) break;

        ctx.globalAlpha = 0.12;
        ctx.fillStyle = m.color;
        ctx.beginPath();
        ctx.roundRect(tagX, tagY, tw, 16, 3);
        ctx.fill();
        ctx.globalAlpha = 0.7;
        ctx.fillText(entity, tagX + 5, tagY + 11.5);
        tagX += tw + 4;
      }
      ctx.globalAlpha = 1;
    }
  }

  // Scroll indicator
  if (maxScroll > 0) {
    const barH = Math.max(40, (H / (maxScroll + H)) * H);
    const barY = (scrollY / maxScroll) * (H - barH);
    ctx.fillStyle = 'rgba(139,148,158,0.2)';
    ctx.beginPath();
    ctx.roundRect(W - 6, barY, 3, barH, 2);
    ctx.fill();
  }

  ctx.restore();

  statsEl.textContent = `${memories.length} memories | ${visibleCount} visible | ${layoutCallCount} pretext layouts | ${fps.toFixed(0)} fps`;
}

// ============================================================
// View 2: Constellation — zoomable 2D map
// ============================================================

// Pre-compute entity links once — for 10k memories, limit per-entity pairs
const constellationLinks = (() => {
  const entityMap = new Map();
  for (let i = 0; i < memories.length; i++) {
    for (const e of memories[i].entities) {
      if (!entityMap.has(e)) entityMap.set(e, []);
      entityMap.get(e).push(i);
    }
  }
  const links = [];
  const seen = new Set();
  for (const [entity, indices] of entityMap) {
    if (indices.length < 2) continue;
    // For large groups, only link nearest neighbors (cap at 8 per entity)
    const cap = Math.min(indices.length, 8);
    for (let a = 0; a < cap; a++) {
      for (let b = a + 1; b < cap; b++) {
        const key = indices[a] < indices[b]
          ? `${indices[a]}-${indices[b]}`
          : `${indices[b]}-${indices[a]}`;
        if (seen.has(key)) continue;
        seen.add(key);
        links.push({a: indices[a], b: indices[b], entity});
      }
    }
  }
  console.log(`Pre-computed ${links.length} constellation links`);
  return links;
})();

// Pre-build per-memory link index for hover highlighting
const memoryLinkIndex = new Map();
for (let li = 0; li < constellationLinks.length; li++) {
  const link = constellationLinks[li];
  if (!memoryLinkIndex.has(link.a)) memoryLinkIndex.set(link.a, []);
  if (!memoryLinkIndex.has(link.b)) memoryLinkIndex.set(link.b, []);
  memoryLinkIndex.get(link.a).push(li);
  memoryLinkIndex.get(link.b).push(li);
}

function drawConstellation() {
  ctx.save();
  ctx.scale(dpr, dpr);

  const cx = W / 2 + panX;
  const cy = H / 2 + panY;
  const margin = 50;

  // --- 1) Build set of visible memory indices ---
  const visibleSet = new Set();
  const screenPositions = new Float32Array(memories.length * 2); // [sx, sy, sx, sy, ...]

  for (let i = 0; i < memories.length; i++) {
    const sx = cx + memories[i].cx * zoom;
    const sy = cy + memories[i].cy * zoom;
    screenPositions[i * 2] = sx;
    screenPositions[i * 2 + 1] = sy;
    if (sx > -margin && sx < W + margin && sy > -margin && sy < H + margin) {
      visibleSet.add(i);
    }
  }

  // --- 2) Draw entity links ---
  // When hovering, only draw links related to hovered node (huge perf win at 10k)
  const hoveredLinkSet = new Set();
  if (hoverIndex >= 0) {
    const myLinks = memoryLinkIndex.get(hoverIndex) || [];
    for (const li of myLinks) hoveredLinkSet.add(li);
  }

  let linksDrawn = 0;
  const maxLinksPerFrame = 5000; // budget

  if (hoverIndex >= 0) {
    // Draw only hovered memory's links prominently
    for (const li of hoveredLinkSet) {
      const link = constellationLinks[li];
      const ma = memories[link.a];
      const ax = screenPositions[link.a * 2];
      const ay = screenPositions[link.a * 2 + 1];
      const bx = screenPositions[link.b * 2];
      const by = screenPositions[link.b * 2 + 1];

      ctx.strokeStyle = ma.color;
      ctx.globalAlpha = 0.5;
      ctx.lineWidth = 1.5;

      const midX = (ax + bx) / 2 + (by - ay) * 0.08;
      const midY = (ay + by) / 2 - (bx - ax) * 0.08;
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.quadraticCurveTo(midX, midY, bx, by);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  } else {
    // No hover — draw all visible links with budget
    const baseAlpha = 0.08 + Math.min(zoom * 0.05, 0.12);
    ctx.lineWidth = 0.4;

    for (const link of constellationLinks) {
      if (linksDrawn >= maxLinksPerFrame) break;

      const ax = screenPositions[link.a * 2];
      const ay = screenPositions[link.a * 2 + 1];
      const bx = screenPositions[link.b * 2];
      const by = screenPositions[link.b * 2 + 1];

      // Frustum cull
      if ((ax < -margin && bx < -margin) || (ax > W + margin && bx > W + margin) ||
          (ay < -margin && by < -margin) || (ay > H + margin && by > H + margin)) continue;

      ctx.strokeStyle = memories[link.a].color;
      ctx.globalAlpha = baseAlpha;

      const midX = (ax + bx) / 2 + (by - ay) * 0.08;
      const midY = (ay + by) / 2 - (bx - ax) * 0.08;
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.quadraticCurveTo(midX, midY, bx, by);
      ctx.stroke();
      linksDrawn++;
    }
    ctx.globalAlpha = 1;
  }

  // --- 3) Draw memory nodes with spatial label deconfliction ---
  // Use a grid to track occupied label regions and prevent overlap
  const GRID_CELL = 100; // pixels per cell
  const labelGrid = new Set(); // "col,row" keys of occupied cells

  function canPlaceLabel(lx, ly, lw, lh) {
    const c0 = Math.floor(lx / GRID_CELL);
    const c1 = Math.floor((lx + lw) / GRID_CELL);
    const r0 = Math.floor(ly / GRID_CELL);
    const r1 = Math.floor((ly + lh) / GRID_CELL);
    for (let c = c0; c <= c1; c++) {
      for (let r = r0; r <= r1; r++) {
        if (labelGrid.has(`${c},${r}`)) return false;
      }
    }
    return true;
  }

  function claimLabel(lx, ly, lw, lh) {
    const c0 = Math.floor(lx / GRID_CELL);
    const c1 = Math.floor((lx + lw) / GRID_CELL);
    const r0 = Math.floor(ly / GRID_CELL);
    const r1 = Math.floor((ly + lh) / GRID_CELL);
    for (let c = c0; c <= c1; c++) {
      for (let r = r0; r <= r1; r++) {
        labelGrid.add(`${c},${r}`);
      }
    }
  }

  let visibleCount = 0;
  let labelsShown = 0;

  // Draw hovered node last (on top), but process it for hit detection
  const drawOrder = [...visibleSet];
  if (hoverIndex >= 0 && visibleSet.has(hoverIndex)) {
    // Move hovered to end so it draws on top
    const idx = drawOrder.indexOf(hoverIndex);
    if (idx >= 0) { drawOrder.splice(idx, 1); drawOrder.push(hoverIndex); }
  }

  for (const i of drawOrder) {
    const m = memories[i];
    const sx = screenPositions[i * 2];
    const sy = screenPositions[i * 2 + 1];
    visibleCount++;

    const isHovered = i === hoverIndex;
    const isHoverNeighbor = hoveredLinkSet.size > 0 && (memoryLinkIndex.get(i) || []).some(li => hoveredLinkSet.has(li));
    const nodeSize = 2 + (m.entities.length * 0.6);
    const r = nodeSize * Math.min(zoom, 2.5);

    // --- Dot (always drawn) ---
    ctx.beginPath();
    ctx.arc(sx, sy, Math.max(1, r), 0, Math.PI * 2);
    ctx.fillStyle = m.color;
    ctx.globalAlpha = isHovered ? 1 : isHoverNeighbor ? 0.9 : hoverIndex >= 0 ? 0.15 : 0.5;

    if (isHovered || isHoverNeighbor) {
      ctx.shadowColor = m.color;
      ctx.shadowBlur = isHovered ? 15 : 8;
    }
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    // --- Label / card (zoom-dependent with deconfliction) ---
    if (zoom < 0.4 && !isHovered && !isHoverNeighbor) continue;

    if (isHovered || isHoverNeighbor) {
      // Always show label for hovered + neighbors
      drawNodeLabel(i, sx, sy, r, isHovered, true);
      labelsShown++;
    } else if (zoom > 1.8) {
      // High zoom — show cards if space available
      const cardW = Math.min(200, 80 + zoom * 25);
      const cardH = 50;
      const cardX = sx - cardW / 2;
      const cardY = sy - cardH / 2;

      if (canPlaceLabel(cardX, cardY, cardW, cardH)) {
        claimLabel(cardX, cardY, cardW, cardH);
        drawNodeLabel(i, sx, sy, r, false, false);
        labelsShown++;
      }
    } else if (zoom > 0.6) {
      // Mid zoom — show truncated labels with deconfliction
      const labelW = 160;
      const labelH = 18;
      if (canPlaceLabel(sx + r + 4, sy - 8, labelW, labelH)) {
        claimLabel(sx + r + 4, sy - 8, labelW, labelH);
        drawNodeLabel(i, sx, sy, r, false, false);
        labelsShown++;
      }
    }
  }

  function drawNodeLabel(i, sx, sy, r, isHovered, forceShow) {
    const m = memories[i];

    if (zoom > 1.8 || isHovered) {
      // Card mode
      const cardW = Math.min(220, 80 + zoom * 25);
      const textW = cardW - 16;
      const {lines} = layoutWithLines(prepared[i].small, textW, 16);
      const maxLines = isHovered ? Math.min(lines.length, 5) : Math.min(lines.length, Math.floor(zoom));
      const cardH = 8 + maxLines * 16 + 8;

      const cardX = sx - cardW / 2;
      const cardY = sy + r + 4;

      ctx.fillStyle = isHovered ? '#1c2333' : 'rgba(22,27,34,0.92)';
      ctx.beginPath();
      ctx.roundRect(cardX, cardY, cardW, cardH, 6);
      ctx.fill();

      ctx.strokeStyle = isHovered ? m.color : 'rgba(48,54,61,0.6)';
      ctx.lineWidth = isHovered ? 1.5 : 0.5;
      ctx.beginPath();
      ctx.roundRect(cardX, cardY, cardW, cardH, 6);
      ctx.stroke();

      if (isHovered) {
        ctx.shadowColor = m.color;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.roundRect(cardX, cardY, cardW, cardH, 6);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      ctx.font = FONT_SMALL;
      ctx.fillStyle = isHovered ? '#e6edf3' : '#8b949e';
      ctx.textAlign = 'left';
      for (let j = 0; j < maxLines; j++) {
        ctx.fillText(lines[j].text, cardX + 8, cardY + 8 + j * 16 + 12);
      }
    } else {
      // Inline label mode
      ctx.font = FONT_SMALL;
      ctx.fillStyle = isHovered ? '#e6edf3' : '#6e7681';
      ctx.globalAlpha = isHovered ? 1 : forceShow ? 0.85 : Math.min(1, (zoom - 0.4) * 2.5);
      ctx.textAlign = 'left';
      const label = m.text.length > 45 ? m.text.slice(0, 45) + '...' : m.text;
      ctx.fillText(label, sx + r + 5, sy + 4);
      ctx.globalAlpha = 1;
    }
  }

  // --- HUD ---
  ctx.font = MONO;
  ctx.fillStyle = '#484f58';
  ctx.textAlign = 'right';
  ctx.fillText(`zoom: ${zoom.toFixed(2)}x`, W - 16, H - 16);
  ctx.fillText(`labels: ${labelsShown} | links: ${linksDrawn}`, W - 16, H - 32);
  ctx.textAlign = 'left';

  // Legend
  ctx.font = FONT_BOLD;
  const legendY = H - 60;
  for (const [type, color] of Object.entries(TYPE_COLORS)) {
    const lx = type === 'world' ? 16 : type === 'experience' ? 100 : 210;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(lx, legendY, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillText(type.toUpperCase(), lx + 10, legendY + 4);
  }

  // Instructions
  ctx.font = '11px -apple-system, sans-serif';
  ctx.fillStyle = '#30363d';
  ctx.textAlign = 'left';
  ctx.fillText('Scroll to zoom  ·  Drag to pan  ·  Hover to explore connections', 16, H - 16);

  ctx.restore();

  statsEl.textContent = `${memories.length} memories | ${visibleCount} visible | ${labelsShown} labels | ${linksDrawn} links | zoom ${zoom.toFixed(2)}x | ${fps.toFixed(0)} fps`;
}

// ============================================================
// View 3: Timeline — horizontal time flow
// ============================================================

// Sort memories by date for timeline
const timelineSorted = [...memories].sort((a, b) => a.date - b.date);
const timelineIndices = timelineSorted.map(m => memories.indexOf(m));

let timelinePositions = [];

function computeTimelineLayout() {
  const laneH = 80;
  const cardW = 240;
  const textW = cardW - 20;
  const gapX = 16;
  const lanes = 5;
  timelinePositions = [];

  const laneXCursors = new Array(lanes).fill(60);

  console.time('pretext:timeline-layout');
  for (let i = 0; i < timelineSorted.length; i++) {
    const idx = timelineIndices[i];
    const {height: textH} = layout(prepared[idx].heightSmall, textW, 16);
    const cardH = 28 + textH + 10;

    // Pick lane with smallest x cursor
    let bestLane = 0;
    for (let l = 1; l < lanes; l++) {
      if (laneXCursors[l] < laneXCursors[bestLane]) bestLane = l;
    }

    const x = laneXCursors[bestLane];
    const y = 60 + bestLane * laneH + (bestLane % 2) * 15;

    timelinePositions.push({x, y, w: cardW, h: cardH, idx, lane: bestLane});
    laneXCursors[bestLane] = x + cardW + gapX;
  }
  console.timeEnd('pretext:timeline-layout');

  maxScroll = Math.max(0, Math.max(...laneXCursors) - W + 60);
}

function drawTimeline() {
  if (timelinePositions.length === 0) computeTimelineLayout();

  ctx.save();
  ctx.scale(dpr, dpr);

  // Time axis
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, 48);
  ctx.lineTo(W, 48);
  ctx.stroke();

  // Time markers
  ctx.font = MONO;
  ctx.fillStyle = '#484f58';
  const monthsSeen = new Set();

  const viewLeft = timelineScrollX - 100;
  const viewRight = timelineScrollX + W + 100;
  let visibleCount = 0;

  for (let i = 0; i < timelinePositions.length; i++) {
    const pos = timelinePositions[i];
    const sx = pos.x - timelineScrollX;

    if (sx + pos.w < -50 || sx > W + 50) continue;
    visibleCount++;

    const idx = pos.idx;
    const m = memories[idx];
    const isHovered = idx === hoverIndex;

    // Month label on axis
    const monthKey = `${m.date.getFullYear()}-${m.date.getMonth()}`;
    if (!monthsSeen.has(monthKey) && sx > 30) {
      monthsSeen.add(monthKey);
      ctx.fillStyle = '#484f58';
      ctx.font = MONO;
      ctx.fillText(m.date.toLocaleDateString('en-US', {month: 'short', year: 'numeric'}), sx, 40);

      ctx.strokeStyle = '#21262d';
      ctx.beginPath();
      ctx.moveTo(sx, 48);
      ctx.lineTo(sx, H);
      ctx.setLineDash([2, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Vertical line to axis
    ctx.strokeStyle = isHovered ? m.color : '#21262d';
    ctx.globalAlpha = isHovered ? 0.6 : 0.3;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(sx + pos.w / 2, 48);
    ctx.lineTo(sx + pos.w / 2, pos.y);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Card
    ctx.fillStyle = isHovered ? '#1c2333' : '#161b22';
    ctx.beginPath();
    ctx.roundRect(sx, pos.y, pos.w, pos.h, 6);
    ctx.fill();

    ctx.strokeStyle = isHovered ? m.color : '#30363d';
    ctx.lineWidth = isHovered ? 1.5 : 0.5;
    ctx.beginPath();
    ctx.roundRect(sx, pos.y, pos.w, pos.h, 6);
    ctx.stroke();

    if (isHovered) {
      ctx.shadowColor = m.color;
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.roundRect(sx, pos.y, pos.w, pos.h, 6);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Type dot + date
    ctx.fillStyle = m.color;
    ctx.beginPath();
    ctx.arc(sx + 10, pos.y + 14, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.font = MONO;
    ctx.fillStyle = '#484f58';
    ctx.fillText(m.date.toLocaleDateString('en-US', {month: 'short', day: 'numeric'}), sx + 18, pos.y + 18);

    // Text via Pretext
    ctx.font = FONT_SMALL;
    ctx.fillStyle = isHovered ? '#e6edf3' : '#8b949e';
    const {lines} = layoutWithLines(prepared[idx].small, pos.w - 20, 16);
    for (let j = 0; j < lines.length; j++) {
      ctx.fillText(lines[j].text, sx + 10, pos.y + 32 + j * 16 + 10);
    }
  }

  // Scroll indicator
  if (maxScroll > 0) {
    const barW = Math.max(40, (W / (maxScroll + W)) * W);
    const barX = (timelineScrollX / maxScroll) * (W - barW);
    ctx.fillStyle = 'rgba(139,148,158,0.2)';
    ctx.beginPath();
    ctx.roundRect(barX, H - 6, barW, 3, 2);
    ctx.fill();
  }

  ctx.restore();

  statsEl.textContent = `${memories.length} memories | ${visibleCount} visible | ${fps.toFixed(0)} fps`;
}

// ============================================================
// Hit detection
// ============================================================

function hitTestWall(mx, my) {
  const testY = my + scrollY;
  for (let i = 0; i < wallCardPositions.length; i++) {
    const p = wallCardPositions[i];
    if (mx >= p.x && mx <= p.x + p.w && testY >= p.y && testY <= p.y + p.h) return i;
  }
  return -1;
}

function hitTestConstellation(mx, my) {
  const cx = W / 2 + panX;
  const cy = H / 2 + panY;
  let closest = -1;
  let closestDist = zoom > 1.2 ? 100 : 30;

  for (let i = 0; i < memories.length; i++) {
    const m = memories[i];
    const sx = cx + m.cx * zoom;
    const sy = cy + m.cy * zoom;
    const dx = mx - sx;
    const dy = my - sy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < closestDist) {
      closestDist = dist;
      closest = i;
    }
  }
  return closest;
}

function hitTestTimeline(mx, my) {
  for (let i = 0; i < timelinePositions.length; i++) {
    const p = timelinePositions[i];
    const sx = p.x - timelineScrollX;
    if (mx >= sx && mx <= sx + p.w && my >= p.y && my <= p.y + p.h) return p.idx;
  }
  return -1;
}

// ============================================================
// Tooltip
// ============================================================

function showTooltip(idx, mx, my) {
  const m = memories[idx];
  let html = `<div class="type" style="color:${m.color}">${m.type}</div>`;
  html += `<div>${m.text}</div>`;
  if (m.entities.length > 0) {
    html += `<div class="entities">${m.entities.map(e => `<span>${e}</span>`).join('')}</div>`;
  }
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';

  const tx = Math.min(mx + 16, W - 380);
  const ty = Math.min(my + 16, H - 120);
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

// ============================================================
// Event handlers
// ============================================================

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();

  if (currentView === 'wall') {
    targetScrollY = Math.max(0, Math.min(maxScroll, targetScrollY + e.deltaY));
  } else if (currentView === 'constellation') {
    const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
    targetZoom = Math.max(0.05, Math.min(6, targetZoom * zoomFactor));
  } else if (currentView === 'timeline') {
    targetTimelineScrollX = Math.max(0, Math.min(maxScroll, targetTimelineScrollX + e.deltaX + e.deltaY));
  }
}, {passive: false});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (currentView === 'constellation' && isDragging) {
    targetPanX = panStartX + (e.clientX - dragStartX);
    targetPanY = panStartY + (e.clientY - dragStartY);
    return;
  }

  let idx = -1;
  if (currentView === 'wall') idx = hitTestWall(mx, my);
  else if (currentView === 'constellation') idx = hitTestConstellation(mx, my);
  else if (currentView === 'timeline') idx = hitTestTimeline(mx, my);

  if (idx !== hoverIndex) {
    hoverIndex = idx;
    canvas.style.cursor = idx >= 0 ? 'pointer' : 'default';
    if (idx >= 0) showTooltip(idx, mx, my);
    else hideTooltip();
  } else if (idx >= 0) {
    showTooltip(idx, mx, my);
  }
});

canvas.addEventListener('mousedown', (e) => {
  if (currentView === 'constellation') {
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    panStartX = panX;
    panStartY = panY;
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('mouseup', () => {
  isDragging = false;
  if (currentView === 'constellation') canvas.style.cursor = 'default';
});

canvas.addEventListener('mouseleave', () => {
  hoverIndex = -1;
  isDragging = false;
  hideTooltip();
});

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentView = tab.dataset.view;
    hoverIndex = -1;
    hideTooltip();

    // Reset view state
    if (currentView === 'wall') {
      wallCardPositions = [];
      targetScrollY = 0;
      scrollY = 0;
    } else if (currentView === 'constellation') {
      targetPanX = 0; targetPanY = 0;
      panX = 0; panY = 0;
      targetZoom = 0.35; zoom = 0.35;
    } else if (currentView === 'timeline') {
      timelinePositions = [];
      targetTimelineScrollX = 0;
      timelineScrollX = 0;
    }
  });
});

// ============================================================
// Render loop
// ============================================================

function frame(now) {
  const dt = now - lastFrameTime;
  fps = 1000 / dt;
  lastFrameTime = now;

  // Smooth scrolling
  scrollY = lerp(scrollY, targetScrollY, 0.15);
  timelineScrollX = lerp(timelineScrollX, targetTimelineScrollX, 0.15);
  panX = lerp(panX, targetPanX, 0.12);
  panY = lerp(panY, targetPanY, 0.12);
  zoom = lerp(zoom, targetZoom, 0.12);

  // Clear
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (currentView === 'wall') drawWall();
  else if (currentView === 'constellation') drawConstellation();
  else if (currentView === 'timeline') drawTimeline();

  requestAnimationFrame(frame);
}

function lerp(a, b, t) { return a + (b - a) * t; }

// Start
computeWallLayout();
requestAnimationFrame(frame);

</script>
</body>
</html>
